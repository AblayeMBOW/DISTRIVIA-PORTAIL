<style>

    --bleu:#0F2A4A; --bleu2:#1B3D63; --terra:#C85E2D; --terra2:#E0764A; --creme:#F5F1E8;

  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Segoe UI', system-ui, -apple-system, sans-serif; background:var(--creme); color:var(--anthra); font-size:15px; line-height:1.5;}

  .tablewrap{overflow-x:auto; background:#fff; border-radius:14px; box-shadow:var(--ombre); padding:6px;}

  footer .cols{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:24px;}
  footer h4{color:#fff; font-size:14px; margin-bottom:10px; letter-spacing:1px;}
  footer p,footer a{color:#9FB3CC; font-size:13.5px; display:block; margin-bottom:6px;}
  footer .copy{border-top:1px solid rgba(255,255,255,.12); margin-top:24px; padding-top:16px; font-size:12px; color:#7E91A8; text-align:center;}

  /* MODAL / TOAST */
  .modalbg{position:fixed; inset:0; background:rgba(15,42,74,.55); display:flex; align-items:center; justify-content:center; padding:14px; z-index:60;}
  .modal{background:#fff; border-radius:14px; padding:26px; width:100%; max-width:460px; max-height:92vh; overflow:auto; box-shadow:var(--ombre2);}
  .x{background:none; border:none; font-size:24px; color:var(--gris); cursor:pointer; float:right; line-height:1;}
  #toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--bleu); color:#fff; padding:13px 22px; border-radius:10px; font-weight:600; display:none; z-index:80; box-shadow:var(--ombre2);}
  .cfgbanner{background:#FCEFE7; border-bottom:1px solid var(--terra); color:#8a3f1b; font-size:13px; padding:8px 16px; text-align:center;}

</style>

<!-- Firebase (même projet que DISTRIVIA Gestion) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script>
/* ============================================================
   DISTRIVIA — Portail clients & fournisseurs
   Branché sur Firebase (même base que DISTRIVIA Gestion).
   Sans configuration, fonctionne en mode DÉMO (local).
   ============================================================ */

/* ---------- CONFIGURATION FIREBASE ----------
   MÊME bloc que dans DISTRIVIA Gestion (index.html).
   Les commandes des clients arriveront directement dans Gestion. */
const firebaseConfig = {
  apiKey: "AIzaSyCcl7rBRT1jiDwVR30_1dUND9HCKkq8sgg",
  authDomain: "distrivia-group.firebaseapp.com",
  projectId: "distrivia-group",
  storageBucket: "distrivia-group.firebasestorage.app",
  messagingSenderId: "379306867104",
  appId: "1:379306867104:web:08d849ee32095d67a88cc5"
};
/* -------------------------------------------------------------- */

const CONFIGURED = !!(firebaseConfig.apiKey && firebaseConfig.projectId);
let fdb = null;  // firestore
if(CONFIGURED){
  try{
    firebase.initializeApp(firebaseConfig);
    fdb = firebase.firestore();
    // Cache local Firestore : réponses instantanées au retour
    try{ fdb.enablePersistence({synchronizeTabs:true}).catch(()=>{}); }catch(e){}
    if(firebase.auth){
      // Persiste la session anonyme → fbReady() résout immédiatement aux visites suivantes
      try{ firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(()=>{}); }catch(e){}
      if(!firebase.auth().currentUser){
        firebase.auth().signInAnonymously().catch(e=>console.warn("Auth:",e&&e.code));
      }
    }
  }catch(e){ console.error("Firebase init:", e); }
}

const FAMILIES = [
  {emoji:"🥤", name:"Restauration & take-away", tag:"Le cœur du marché — rotation quotidienne",
   items:[["Gobelets carton","Cafés, boissons chaudes"],["Gobelets plastique","Boissons froides, jus"],["Boîtes kraft take-away","Repas à emporter"],["Barquettes alimentaires","Plats, cérémonies"],["Assiettes jetables","Carton et plastique"],["Couverts jetables","Fourchettes, couteaux, cuillères"]]},
  {emoji:"🧻", name:"Hygiène & entretien", tag:"Présence obligatoire partout",
   items:[["Papier hygiénique","Simple, double, jumbo"],["Essuie-tout","Cuisine, nettoyage pro"],["Sacs poubelles","Toutes contenances"],["Lingettes","Désinfectantes, bébé"]]},
  {emoji:"🏥", name:"Consommables médicaux", tag:"Forte marge, demande structurelle",
   items:[["Gants jetables","Latex, nitrile, vinyle"],["Masques chirurgicaux","3 plis, FFP2"],["Blouses & charlottes","Protection non tissée"]]},
  {emoji:"🎉", name:"Événementiel", tag:"Pics Gamou, Magal, Korité, Tabaski",
   items:[["Kits vaisselle","Mariages, baptêmes, cérémonies"],["Nappes jetables","Plastique, papier, intissé"],["Serviettes de table","Formats et coloris variés"]]},
  {emoji:"🌱", name:"Écologique", tag:"Conforme à la loi anti-plastique",
   items:[["Assiettes fibre de canne","Biodégradables, compostables"],["Couverts bambou","Alternative naturelle"],["Gobelets PLA / kraft","Biodégradables"],["Emballages kraft","Sacs, boîtes, papier alimentaire"]]},
  {emoji:"💻", name:"Consommables informatiques", tag:"Pour bureaux et administrations",
   items:[["Cartouches & toners","Principales marques"],["Supports & câbles","Stockage, connectique"]]},
  {emoji:"🗂️", name:"Matériel & mobilier de bureau", tag:"Équiper vos espaces de travail",
   items:[["Fournitures de bureau","Papeterie, classement"],["Mobilier","Chaises, tables, rangements"]]},
];

const SERVICES = [
  {emoji:"🚚", t:"Livraison 48 h sur Dakar", d:"Tournées à jour fixe par zone. Vous savez quand DISTRIVIA passe."},
  {emoji:"📦", t:"Stock permanent", d:"Zéro rupture sur le cœur de gamme, même pendant les pics de fêtes."},
  {emoji:"🏷️", t:"Prix de gros affichés", d:"Prix carton, palette et contrat — transparents, sans marchandage."},
  {emoji:"🧾", t:"Facture systématique", d:"Conformité réglementaire garantie sur chaque produit livré."},
];

/* ---------- État ---------- */
let view = "home";          // home | client-auth | client | supplier-auth | supplier
let session = null;         // {kind:"client"|"supplier", id, name, email, ...}
let acctTab = "orders";
let cart = [];              // [{name, family, qty, note}]
let catalogProducts = [];   // produits venant de Gestion/Supabase (sinon FAMILIES)
let announcements = [];     // annonces publiées depuis Gestion (promos, infos)
let modalContent = null;

const LS = {
  get k(){ return "distrivia-portail"; },
  load(){ try{ return JSON.parse(localStorage.getItem(this.k)||"{}"); }catch(e){ return {}; } },
  save(d){ localStorage.setItem(this.k, JSON.stringify(d)); },
};
function demoDB(){
  const d = LS.load();
  d.accounts = d.accounts||[]; d.orders=d.orders||[]; d.appointments=d.appointments||[];
  d.claims=d.claims||[]; d.quotes=d.quotes||[];
  return d;
}
function demoSave(d){ LS.save(d); }

const el = id => document.getElementById(id);
const esc = s => String(s??"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const fmt = n => (Math.round(n)||0).toLocaleString("fr-FR")+" F";
const today = () => new Date().toISOString().slice(0,10);
const nowISO = () => new Date().toISOString();
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);
function toast(m){ const t=el("toast"); t.textContent=m; t.style.display="block"; setTimeout(()=>t.style.display="none",2600); }

/* ---------- Hash léger (offuscation mot de passe portail) ---------- */
async function sha256(str){
  if(window.crypto && window.crypto.subtle){
    const buf=await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
  }
  let h=5381; for(let i=0;i<str.length;i++) h=((h<<5)+h+str.charCodeAt(i))>>>0; return "h"+h.toString(16);
}

/* ============================================================
   DATA LAYER — Firestore (partagé avec Gestion) ou démo locale
   Collections : portal_clients, portal_suppliers, portal_orders,
   portal_appointments, portal_claims, portal_quotes, distrivia/etat (catalogue)
   ============================================================ */
async function fbReady(){
  if(!CONFIGURED || !firebase.auth) return;
  if(firebase.auth().currentUser) return;
  await new Promise(res=>{ const to=setTimeout(res,2500);
    const u=firebase.auth().onAuthStateChanged(x=>{ if(x){ clearTimeout(to); u(); res(); } }); });
}
async function dbSignUp(kind, payload){
  const table = kind==="client" ? "portal_clients" : "portal_suppliers";
  const hash = await sha256(payload.email.toLowerCase()+"|"+payload.password);
  if(CONFIGURED){
    await fbReady();
    const snap = await fdb.collection(table).where("email","==",payload.email.toLowerCase()).limit(1).get();
    if(!snap.empty) throw new Error("Un compte existe déjà avec cet email.");
    const ref = await fdb.collection(table).add({
      name:payload.name, email:payload.email.toLowerCase(), phone:payload.phone||"",
      hash, details:payload, kind, created:nowISO()
    });
    return { id:ref.id, name:payload.name, email:payload.email.toLowerCase(), kind };
  }
  const d=demoDB();
  if(d.accounts.some(a=>a.email===payload.email.toLowerCase())) throw new Error("Un compte existe déjà avec cet email.");
  const acc={ id:uid(), kind, name:payload.name, email:payload.email.toLowerCase(), hash,
    phone:payload.phone||"", details:payload, created:nowISO() };
  d.accounts.push(acc); demoSave(d);
  return acc;
}
async function dbSignIn(kind, email, password){
  const table = kind==="client" ? "portal_clients" : "portal_suppliers";
  const hash = await sha256(email.toLowerCase()+"|"+password);
  if(CONFIGURED){
    await fbReady();
    const snap = await fdb.collection(table).where("email","==",email.toLowerCase()).limit(1).get();
    if(snap.empty) throw new Error("Aucun compte "+(kind==="client"?"client":"fournisseur")+" avec cet email.");
    const doc = snap.docs[0]; const data = doc.data();
    if(data.hash !== hash) throw new Error("Mot de passe incorrect.");
    return { id:doc.id, name:data.name, email:data.email, kind };
  }
  const d=demoDB();
  const acc=d.accounts.find(a=>a.email===email.toLowerCase() && a.hash===hash && a.kind===kind);
  if(!acc) throw new Error("Email ou mot de passe incorrect.");
  return acc;
}
async function dbInsert(table, row){
  if(CONFIGURED){ await fbReady(); await fdb.collection(table).doc(row.id).set(row); return; }
  const d=demoDB(); const key={ portal_orders:"orders", portal_appointments:"appointments", portal_claims:"claims", portal_quotes:"quotes" }[table];
  d[key].push(row); demoSave(d);
}
async function dbList(table, ownerField, ownerId){
  if(CONFIGURED){
    await fbReady();
    const snap = await fdb.collection(table).where(ownerField,"==",ownerId).get();
    const rows = snap.docs.map(d=>d.data());
    return rows.sort((a,b)=>(a.created<b.created?1:-1));
  }
  const d=demoDB(); const key={ portal_orders:"orders", portal_appointments:"appointments", portal_claims:"claims", portal_quotes:"quotes" }[table];
  return (d[key]||[]).filter(r=>r[ownerField]===ownerId).sort((a,b)=>(a.created<b.created?1:-1));
}
let catalogLoaded = false;
async function loadCatalog(force){
  if(!CONFIGURED) return;
  if(catalogLoaded && !force) return;        // déjà chargé : on ne refait rien
  // 1) Affichage instantané depuis le cache local (si dispo)
  try{
    const cached = localStorage.getItem("distrivia-portail-catalog");
    if(cached && !catalogProducts.length){ catalogProducts = JSON.parse(cached); }
  }catch(e){}
  // 2) Rafraîchissement depuis Firebase en arrière-plan
  try{
    await fbReady();
    const snap = await fdb.collection("distrivia").doc("etat").get();
    if(snap.exists){
      const blob = snap.data().blob;
      if(blob){ const S = JSON.parse(blob);
        if(S.products && S.products.length){
          catalogProducts = S.products.map(p=>({ name:p.name, family:p.family, price:p.price }));
          try{ localStorage.setItem("distrivia-portail-catalog", JSON.stringify(catalogProducts)); }catch(e){}
        }
      }
    }
    catalogLoaded = true;
  }catch(e){ console.warn("Catalogue:", e); }
}
async function loadAnnouncements(){
  // cache instantané
  try{ const c=localStorage.getItem("distrivia-portail-anns"); if(c && !announcements.length) announcements=JSON.parse(c); }catch(e){}
  if(!CONFIGURED) return;
  try{
    await fbReady();
    const snap = await fdb.collection("portal_announcements").get();
    const today = new Date().toISOString().slice(0,10);
    announcements = snap.docs.map(d=>d.data())
      .filter(a=>a.active!==false && (!a.expire || a.expire>=today))
      .sort((a,b)=>(a.created<b.created?1:-1));
    try{ localStorage.setItem("distrivia-portail-anns", JSON.stringify(announcements)); }catch(e){}
    // rafraîchir l'accueil si affiché
    if(view==="home"){ const box=el("ann-box"); if(box) box.innerHTML=announcementsHTML(); }
  }catch(e){ console.warn("Annonces:", e); }
}
function annColor(c){ return {terra:"#C85E2D",bleu:"#0F2A4A",vert:"#2E6B3E",rouge:"#A33B3B"}[c]||"#C85E2D"; }

function vAuth(kind){
  const isClient = kind==="client";
  return `<section><div class="wrap">

      <div id="auth-body"></div>

}
let authMode="login";
function switchAuth(m){ authMode=m; el("tab-login").classList.toggle("active",m==="login"); el("tab-signup").classList.toggle("active",m==="signup"); renderAuthBody(); }
function renderAuthBody(){
  const kind = view==="client-auth"?"client":"supplier";
  const isClient = kind==="client";
  const b=el("auth-body");
  if(authMode==="login"){
    b.innerHTML=`<label>Email</label><input id="a-email" type="email" autocomplete="username">
      <label>Mot de passe</label><input id="a-pass" type="password" autocomplete="current-password">
      <button class="btn full" style="margin-top:18px" onclick="doLogin('${kind}')">Se connecter</button>
      <div id="a-fb"></div>`;
  } else {
    b.innerHTML=`<label>${isClient?"Nom / établissement":"Nom de l'entreprise"}</label><input id="a-name" placeholder="${isClient?"Ex. Restaurant Teranga":"Ex. Shenzhen Pack Co."}">
      ${isClient
        ? `<div class="grid2"><div><label>Type d'établissement</label><select id="a-type"><option>Restaurant / fast-food</option><option>Dibiterie / gargote</option><option>Traiteur / événementiel</option><option>Boulangerie</option><option>Boutique / revendeur</option><option>Clinique / pharmacie</option><option>Hôtel</option><option>Entreprise / école</option><option>Particulier</option></select></div>
           <div><label>Zone / quartier</label><input id="a-zone" placeholder="Ex. Plateau"></div></div>`
        : `<div class="grid2"><div><label>Pays</label><input id="a-country" placeholder="Ex. Chine, Maroc, Sénégal"></div>
           <div><label>Catégorie fournie</label><input id="a-cat" placeholder="Ex. emballages kraft"></div></div>`}
      <div class="grid2"><div><label>Téléphone (WhatsApp)</label><input id="a-phone" placeholder="+221 77 …"></div>
        <div><label>Email</label><input id="a-email" type="email" autocomplete="email"></div></div>
      <label>Mot de passe</label><input id="a-pass" type="password" autocomplete="new-password" placeholder="min. 6 caractères">
      <button class="btn full" style="margin-top:18px" onclick="doSignup('${kind}')">Créer mon compte</button>
      <div id="a-fb"></div>`;
  }
}
async function doLogin(kind){
  const email=el("a-email").value.trim().toLowerCase(), pass=el("a-pass").value;
  if(!email||!pass){ el("a-fb").innerHTML=`<div class="err">Email et mot de passe requis.</div>`; return; }
  el("a-fb").innerHTML=`<p class="muted" style="margin-top:8px">Connexion…</p>`;
  try{
    const acc=await dbSignIn(kind, email, pass);
    session={ kind, id:acc.id, name:acc.name, email:acc.email };
    saveSession(); acctTab = kind==="client"?"orders":"quotes"; go(kind); toast("Bienvenue, "+acc.name);
    // catalogue en arrière-plan (ne bloque pas l'affichage)
    loadCatalog().then(()=>{ if(view==="client"&&acctTab==="new") renderAcctBody(); });
  }catch(e){ el("a-fb").innerHTML=`<div class="err">${esc(e.message||"Connexion impossible.")}</div>`; }
}
async function doSignup(kind){
  const isClient=kind==="client";
  const name=el("a-name").value.trim(), email=el("a-email").value.trim().toLowerCase(),
    pass=el("a-pass").value, phone=el("a-phone").value.trim();
  if(!name||!email||!pass){ el("a-fb").innerHTML=`<div class="err">Nom, email et mot de passe sont requis.</div>`; return; }
  if(pass.length<6){ el("a-fb").innerHTML=`<div class="err">Le mot de passe doit faire au moins 6 caractères.</div>`; return; }
  const payload={ name, email, password:pass, phone };
  if(isClient){ payload.type=el("a-type").value; payload.zone=el("a-zone").value.trim(); }
  else { payload.country=el("a-country").value.trim(); payload.cat=el("a-cat").value.trim(); }
  el("a-fb").innerHTML=`<p class="muted" style="margin-top:8px">Création du compte…</p>`;
  try{
    const acc=await dbSignUp(kind, payload);
    session={ kind, id:acc.id, name:acc.name, email:acc.email };
    saveSession(); acctTab=isClient?"orders":"quotes"; go(kind); toast("Compte créé. Bienvenue, "+name+" !");
    loadCatalog().then(()=>{ if(view==="client"&&acctTab==="new") renderAcctBody(); });
  }catch(e){ el("a-fb").innerHTML=`<div class="err">${esc(e.message||"Création impossible.")}</div>`; }
}

async function renderAcctBody(){
  const body=el("acct-body"); if(!body) return;
  if(view==="client"){
    if(acctTab==="orders"){ body.innerHTML=await clientOrdersHTML(); bindOrderDetails(); return; }
    if(acctTab==="new") return body.innerHTML=clientNewOrderHTML(), bindCatalogPicker();
    if(acctTab==="appointments") return body.innerHTML=await clientApptHTML(), bindAppt();
    if(acctTab==="claims") return body.innerHTML=await clientClaimsHTML(), bindClaim();
    if(acctTab==="profile") return body.innerHTML=profileHTML();
  } else if(view==="supplier"){
    if(acctTab==="quotes") return body.innerHTML=await supplierQuotesHTML();
    if(acctTab==="newquote") return body.innerHTML=supplierNewQuoteHTML(), bindQuote();
    if(acctTab==="claims") return body.innerHTML=await supplierMsgHTML(), bindClaim();
    if(acctTab==="profile") return body.innerHTML=profileHTML();

/* ----- Client: orders list ----- */
let _ordersCache = {};   // id -> order (pour le détail)
async function clientOrdersHTML(){
  const list=await dbList("portal_orders","client_id",session.id);
  if(!list.length) return `<div class="card" style="text-align:center"><p style="margin-bottom:14px">Vous n'avez pas encore passé de commande.</p><button class="btn" onclick="setTab('new')">Passer ma première commande</button></div>`;
  _ordersCache = {};
  list.forEach(o=>{ _ordersCache[o.id||o.ref] = o; });
  return `<div class="tablewrap"><table>
    <tr><th>N°</th><th>Date</th><th>Articles</th><th>Statut</th><th></th></tr>
    ${list.map(o=>`<tr><td><b>${esc(o.ref)}</b></td><td>${(o.created||"").slice(0,10)}</td>
      <td>${(o.items||[]).map(i=>i.qty+"× "+esc(i.name)).join(", ")}</td>
      <td><span class="badge ${o.status}">${statusLabel(o.status)}</span></td>
      <td><button class="btn sm outline" data-vieworder="${esc(o.id||o.ref)}">Détails</button></td></tr>`).join("")}
  </table></div>`;
}
function statusLabel(s){ return {new:"Reçue",confirmed:"Confirmée",delivered:"Livrée",cancelled:"Annulée",pending:"En attente",resolved:"Résolue"}[s]||s; }
function showOrder(id){
  const o=_ordersCache[id]; if(!o) return;
  openModal(`<button class="x" onclick="closeModal()">×</button><h3 style="color:var(--bleu)">Commande ${esc(o.ref)}</h3>
    <p class="muted">${(o.created||"").slice(0,10)} · <span class="badge ${o.status}">${statusLabel(o.status)}</span></p>
    <table style="margin-top:14px"><tr><th>Article</th><th class="num">Qté</th></tr>
    ${(o.items||[]).map(i=>`<tr><td>${esc(i.name)}${i.note?`<div class="muted">${esc(i.note)}</div>`:""}</td><td class="num">${i.qty}</td></tr>`).join("")}</table>
    ${o.note?`<p class="muted" style="margin-top:12px"><b>Note :</b> ${esc(o.note)}</p>`:""}
    <p class="muted" style="margin-top:12px">Mode : ${o.delivery==="pickup"?"Retrait entrepôt":"Livraison"} ${o.zone?"· "+esc(o.zone):""}</p>
    ${o.localNum?`<p class="muted">Référence interne : <b>${esc(o.localNum)}</b></p>`:""}
    <button class="btn full" style="margin-top:16px" onclick="closeModal()">Fermer</button>`);
}
function bindOrderDetails(){
  document.querySelectorAll("[data-vieworder]").forEach(b=> b.onclick = ()=> showOrder(b.dataset.vieworder));
}

        <select id="o-delivery"><option value="delivery">Livraison (48 h sur Dakar)</option><option value="pickup">Retrait à l'entrepôt</option></select>
        <label>Zone / adresse de livraison</label><input id="o-zone" placeholder="Ex. Plateau, près de…" value="${esc((session&&session.zone)||"")}">
        <label>Note (facultatif)</label><textarea id="o-note" placeholder="Précisions sur votre commande…"></textarea>
        <button class="btn full" style="margin-top:14px" onclick="submitOrder()">Envoyer la commande</button>
        <p class="muted" style="margin-top:8px">Un conseiller confirme votre commande et les prix sous 24 h.</p>
        `:""}
      </div>
    </div>
  </div>`;
}
function groupByFamily(prods){
  const m={}; prods.forEach(p=>{ const f=p.family||"Autres"; (m[f]=m[f]||{name:f,emoji:"▸",items:[]}).items.push({name:p.name}); });
  return Object.values(m);
}
function cartHTML(){
  if(!cart.length) return `<p class="muted">Votre panier est vide. Ajoutez des produits depuis la liste.</p>`;
  return cart.map((l,i)=>`<div class="cartline">
    <div><div style="font-weight:600">${esc(l.name)}</div><div class="muted">${esc(l.family)}</div></div>
    <div class="qty"><button onclick="cartQty(${i},-1)">−</button><b>${l.qty}</b><button onclick="cartQty(${i},1)">+</button></div>
    <div></div><button class="x" style="float:none" onclick="cartRemove(${i})">×</button>
  </div>`).join("");
}
function bindCatalogPicker(){
  document.querySelectorAll("[data-add]").forEach(p=> p.onclick=()=>{
    const [name,family]=p.dataset.add.split("|");
    const ex=cart.find(l=>l.name===name); if(ex) ex.qty++; else cart.push({name,family,qty:1});
    const cb=el("cart-body"); refreshCartArea();
    toast(name+" ajouté");
  });
}
function refreshCartArea(){
  // re-render the whole new-order body to update both cart + show checkout
  renderAcctBody();
}
function cartQty(i,d){ cart[i].qty=Math.max(1,cart[i].qty+d); refreshCartArea(); }
function cartRemove(i){ cart.splice(i,1); refreshCartArea(); }
async function submitOrder(){
  if(!cart.length) return;
  const ref="WEB-"+new Date().getFullYear()+"-"+uid().slice(0,5).toUpperCase();
  const row={ id:uid(), ref, client_id:session.id, client_name:session.name, client_email:session.email,
    items:cart.map(l=>({name:l.name,family:l.family,qty:l.qty})), note:el("o-note")?el("o-note").value.trim():"",
    delivery:el("o-delivery")?el("o-delivery").value:"delivery", zone:el("o-zone")?el("o-zone").value.trim():"",
    status:"new", created:nowISO() };
  try{
    await dbInsert("portal_orders", row);
    cart=[]; acctTab="orders"; render();
    toast("Commande "+ref+" envoyée ✓");
  }catch(e){ toast("Erreur : "+(e.message||"envoi impossible")); }
}

/* ----- Client: appointments ----- */

    <div class="panel" style="margin:0">

      <label>Objet</label><select id="ap-type"><option>Visite commerciale</option><option>Devis sur mesure</option><option>Visite de l'entrepôt</option><option>Ouverture de compte pro</option><option>Autre</option></select>
      <div class="grid2"><div><label>Date souhaitée</label><input id="ap-date" type="date" min="${today()}"></div>
        <div><label>Créneau</label><select id="ap-slot"><option>Matin (8h–12h)</option><option>Après-midi (14h–18h)</option></select></div></div>
      <label>Message (facultatif)</label><textarea id="ap-note" placeholder="Précisez votre besoin…"></textarea>

function bindAppt(){}
async function submitAppt(){
  const date=el("ap-date").value; if(!date){ el("ap-fb").innerHTML=`<div class="err">Choisissez une date.</div>`; return; }
  const row={ id:uid(), client_id:session.id, client_name:session.name, subject:el("ap-type").value, date, slot:el("ap-slot").value, note:el("ap-note").value.trim(), status:"pending", created:nowISO() };

/* ----- Client: claims / Supplier: messages ----- */
let _claimsCache = {};
async function clientClaimsHTML(){ return claimsHTML("client_id"); }
async function supplierMsgHTML(){ return claimsHTML("supplier_id","Message à DISTRIVIA"); }
async function claimsHTML(field, title){
  const list=await dbList("portal_claims",field,session.id);
  _claimsCache={}; list.forEach(c=>{ _claimsCache[c.id]=c; });
  return `<div class="grid g2">
    <div class="panel" style="margin:0">
      <h3 style="color:var(--bleu); margin-bottom:10px">${title||"Nouveau message / réclamation"}</h3>
      ${!title?`<label>Type</label><select id="cl-type"><option>Problème de livraison</option><option>Produit non conforme</option><option>Erreur de facturation</option><option>Réclamation qualité</option><option>Question / autre</option></select>
      <label>N° de commande concerné (facultatif)</label><input id="cl-ref" placeholder="Ex. WEB-2026-…">`:`<input type="hidden" id="cl-type" value="Message"><input type="hidden" id="cl-ref" value="">`}
      <label>Message</label><textarea id="cl-msg" placeholder="Décrivez votre demande…"></textarea>
      <button class="btn full" style="margin-top:14px" onclick="submitClaim('${field}')">Envoyer</button>
      <div id="cl-fb"></div>
    </div>
    <div>${list.length?`<div class="tablewrap"><table><tr><th>Objet</th><th>Date</th><th>Statut</th></tr>
      ${list.map(c=>{ const nrep=(c.replies||[]).length; return `<tr style="cursor:pointer" data-viewclaim="${esc(c.id)}"><td>${esc(c.type)}${c.ref?`<div class="muted">${esc(c.ref)}</div>`:""}<div class="muted">${esc((c.message||"").slice(0,55))}${(c.message||"").length>55?"…":""}</div>${nrep?`<div style="color:var(--vert);font-size:12px">💬 ${nrep} réponse(s) — voir</div>`:""}</td><td>${(c.created||"").slice(0,10)}</td><td><span class="badge ${c.status}">${statusLabel(c.status)}</span></td></tr>`;}).join("")}</table></div>`
      :`<div class="card"><p class="muted">Aucun message pour l'instant.</p></div>`}</div>
  </div>`;
}
function bindClaim(){
  document.querySelectorAll("[data-viewclaim]").forEach(r=> r.onclick = ()=> showClaim(r.dataset.viewclaim));
}
function showClaim(id){
  const c=_claimsCache[id]; if(!c) return;
  const replies=c.replies||[];
  const thread=`
    <div style="background:var(--creme);border-radius:8px;padding:10px;margin:4px 0">
      <div style="font-size:11px;color:#888">Vous · ${(c.created||"").slice(0,16).replace("T"," ")}</div>
      <div style="margin-top:3px">${esc(c.message||"")}</div></div>
    ${replies.map(r=>`<div style="background:${r.from==="DISTRIVIA"?"var(--bleu)":"var(--creme)"};color:${r.from==="DISTRIVIA"?"#fff":"#1A1A1A"};border-radius:8px;padding:10px;margin:4px 0;${r.from==="DISTRIVIA"?"margin-right:24px":"margin-left:24px"}">
      <div style="font-size:11px;opacity:.8">${r.from==="DISTRIVIA"?"DISTRIVIA":"Vous"} · ${(r.date||"").slice(0,16).replace("T"," ")}</div>
      <div style="margin-top:3px">${esc(r.text)}</div></div>`).join("")}`;
  openModal(`<button class="x" onclick="closeModal()">×</button><h3 style="color:var(--bleu)">${esc(c.type||"Message")}</h3>
    <p class="muted">${c.ref?"Réf. "+esc(c.ref)+" · ":""}<span class="badge ${c.status}">${statusLabel(c.status)}</span></p>
    <div style="max-height:45vh;overflow:auto;margin:12px 0">${thread}</div>
    ${replies.some(r=>r.from==="DISTRIVIA")?"":`<p class="muted" style="font-size:13px">Notre équipe vous répondra ici. Vous recevrez la réponse dans cet espace.</p>`}
    <label>Ajouter un message</label><textarea id="cl-more" rows="2" placeholder="Votre réponse…"></textarea>
    <button class="btn full" style="margin-top:10px" onclick="replyClaim('${esc(id)}')">Envoyer</button>`);
}
async function replyClaim(id){
  const c=_claimsCache[id]; if(!c) return;
  const t=el("cl-more").value.trim(); if(!t) return toast("Écrivez un message");
  const replies=[...(c.replies||[]), { from:"client", text:t, date:nowISO() }];
  try{
    if(CONFIGURED){ await fbReady(); await fdb.collection("portal_claims").doc(id).update({replies, status:"pending"}); }
    c.replies=replies; c.status="pending"; toast("Message envoyé ✓"); showClaim(id);
  }catch(e){ toast("Erreur d'envoi"); }
}
window.showClaim=showClaim; window.replyClaim=replyClaim;
async function submitClaim(field){
  const msg=el("cl-msg").value.trim(); if(!msg){ el("cl-fb").innerHTML=`<div class="err">Le message est requis.</div>`; return; }
  const row={ id:uid(), [field]:session.id, author_name:session.name, type:el("cl-type").value, ref:el("cl-ref").value.trim(), message:msg, status:"pending", created:nowISO() };
  try{ await dbInsert("portal_claims", row); render(); toast("Message envoyé ✓"); }
  catch(e){ el("cl-fb").innerHTML=`<div class="err">${esc(e.message)}</div>`; }
}

/* ----- Supplier: quotes ----- */
async function supplierQuotesHTML(){
  const list=await dbList("portal_quotes","supplier_id",session.id);
  if(!list.length) return `<div class="card" style="text-align:center"><p style="margin-bottom:14px">Aucune cotation envoyée.</p><button class="btn" onclick="setTab('newquote')">Envoyer une cotation</button></div>`;
  return `<div class="tablewrap"><table>
    <tr><th>Réf</th><th>Date</th><th>Produit</th><th class="num">Prix proposé</th><th>Statut</th></tr>
    ${list.map(q=>`<tr><td><b>${esc(q.ref)}</b></td><td>${q.created.slice(0,10)}</td><td>${esc(q.product)}</td><td class="num">${esc(q.price)}</td><td><span class="badge ${q.status}">${statusLabel(q.status)}</span></td></tr>`).join("")}
  </table></div>`;
}
function supplierNewQuoteHTML(){
  return `<div class="panel wide" style="margin:0">
    <h3 style="color:var(--bleu); margin-bottom:10px">Proposer une cotation</h3>
    <p class="muted" style="margin-bottom:8px">Soumettez votre offre pour un produit. Notre équipe achats l'étudie et vous répond.</p>
    <div class="grid2">
      <div><label>Produit / référence</label><input id="q-product" placeholder="Ex. Boîte kraft 1000 ml"></div>
      <div><label>Quantité disponible (MOQ)</label><input id="q-moq" placeholder="Ex. 50 000 unités"></div>
      <div><label>Prix proposé (préciser devise & unité)</label><input id="q-price" placeholder="Ex. 45 FCFA/u CIF Dakar"></div>
      <div><label>Délai de production / livraison</label><input id="q-delay" placeholder="Ex. 30 jours + 35 j mer"></div>
    </div>
    <label>Conditions (paiement, certificats, échantillons…)</label><textarea id="q-terms" placeholder="30 % acompte, solde contre documents ; certificat alimentarité disponible…"></textarea>
    <button class="btn full" style="margin-top:14px" onclick="submitQuote()">Envoyer la cotation</button>
    <div id="q-fb"></div>
  </div>`;
}
function bindQuote(){}
async function submitQuote(){
  const product=el("q-product").value.trim(), price=el("q-price").value.trim();
  if(!product||!price){ el("q-fb").innerHTML=`<div class="err">Produit et prix sont requis.</div>`; return; }
  const ref="COT-"+new Date().getFullYear()+"-"+uid().slice(0,5).toUpperCase();
  const row={ id:uid(), ref, supplier_id:session.id, supplier_name:session.name, product, moq:el("q-moq").value.trim(),
    price, delay:el("q-delay").value.trim(), terms:el("q-terms").value.trim(), status:"pending", created:nowISO() };
  try{ await dbInsert("portal_quotes", row); acctTab="quotes"; render(); toast("Cotation "+ref+" envoyée ✓"); }
  catch(e){ el("q-fb").innerHTML=`<div class="err">${esc(e.message)}</div>`; }
}

/* ----- Profile ----- */
function profileHTML(){
  return `<div class="panel" style="margin:0">
    <h3 style="color:var(--bleu); margin-bottom:10px">Mon profil</h3>
    <p><b>Nom :</b> ${esc(session.name)}</p>
    <p><b>Email :</b> ${esc(session.email)}</p>
    <p class="muted" style="margin-top:14px">Pour modifier vos informations, contactez-nous au +221 77 527 82 24.</p>
    <button class="btn outline" style="margin-top:14px" onclick="logout()">Se déconnecter</button>
  </div>`;
}

/* ---------- Modal / nav helpers ---------- */
function openModal(html){ el("modal").innerHTML=`<div class="modalbg" id="mbg"><div class="modal">${html}</div></div>`; el("mbg").onclick=e=>{ if(e.target.id==="mbg") closeModal(); }; }
function closeModal(){ el("modal").innerHTML=""; }
function go(v){ view=v; if(v==="client-auth"||v==="supplier-auth") authMode="login"; render(); if(v==="client-auth"||v==="supplier-auth") renderAuthBody(); if(v==="client"||v==="supplier") renderAcctBody(); }
function bind(){ if(view==="client-auth"||view==="supplier-auth") renderAuthBody(); if(view==="client"||view==="supplier") renderAcctBody(); }
function saveSession(){ try{ localStorage.setItem("distrivia-portail-session", JSON.stringify(session)); }catch(e){} }
function logout(){ if(CONFIGURED&&firebase.auth){ try{ /* on garde la session anonyme Firebase */ }catch(e){} } session=null; try{ localStorage.removeItem("distrivia-portail-session"); }catch(e){} cart=[]; go("home"); toast("Vous êtes déconnecté."); }

/* expose */
window.go=go; window.setTab=setTab; window.switchAuth=switchAuth; window.doLogin=doLogin; window.doSignup=doSignup;
window.submitOrder=submitOrder; window.cartQty=cartQty; window.cartRemove=cartRemove; window.showOrder=showOrder;
window.submitAppt=submitAppt; window.submitClaim=submitClaim; window.submitQuote=submitQuote; window.sendContact=sendContact;
window.openModal=openModal; window.closeModal=closeModal; window.logout=logout;

/* ---------- Boot ---------- */
(async function boot(){
  try{ const s=localStorage.getItem("distrivia-portail-session"); if(s){ session=JSON.parse(s); } }catch(e){}
  // Catalogue depuis le cache : disponible instantanément, avant même Firebase
  try{ const c=localStorage.getItem("distrivia-portail-catalog"); if(c) catalogProducts=JSON.parse(c); }catch(e){}
  try{ const a=localStorage.getItem("distrivia-portail-anns"); if(a) announcements=JSON.parse(a); }catch(e){}
  if(session){ view=session.kind; acctTab = session.kind==="client"?"orders":"quotes"; }
  render();
  if(CONFIGURED){ try{ await loadCatalog(); loadAnnouncements(); if(view==="client"&&acctTab==="new") renderAcctBody(); }catch(e){ console.warn("Firebase init:",e); } }
})();
</script>

</html>
