<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISTRIVIA — Espace client & fournisseur</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230F2A4A'/%3E%3Ctext x='32' y='42' font-family='Arial,sans-serif' font-size='34' font-weight='bold' fill='white' text-anchor='middle'%3ED%3C/text%3E%3Crect x='20' y='48' width='24' height='4' fill='%23C85E2D'/%3E%3C/svg%3E">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --bleu:#0F2A4A; --bleu2:#1B3D63; --terra:#C85E2D; --terra2:#E0764A; --creme:#F5F1E8;
    --anthra:#1A1A1A; --gris:#888880; --blanc:#FFFFFF; --vert:#2E6B3E; --rouge:#A33B3B;
    --ombre:0 2px 12px rgba(15,42,74,.08); --ombre2:0 12px 40px rgba(15,42,74,.18);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Segoe UI', system-ui, -apple-system, sans-serif; background:var(--creme); color:var(--anthra); font-size:15px; line-height:1.5;}
  .wrap{max-width:1080px; margin:0 auto; padding:0 16px;}
  a{color:var(--terra); text-decoration:none;}
  h1,h2,h3{font-family:'Segoe UI', system-ui, sans-serif;}

  /* HEADER */
  header{background:var(--bleu); position:sticky; top:0; z-index:30;}
  .topbar{display:flex; align-items:center; justify-content:space-between; padding:12px 16px; max-width:1080px; margin:0 auto; gap:12px; flex-wrap:wrap;}
  .brand{display:flex; flex-direction:column;}
  .wordmark{color:#fff; font-weight:800; letter-spacing:5px; font-size:20px;}
  .bar{width:62px; height:3px; background:var(--terra); margin:3px 0;}
  .sub{color:#C9D4E2; font-size:8.5px; letter-spacing:3px;}
  .navlinks{display:flex; gap:6px; align-items:center; flex-wrap:wrap;}
  .navlinks button{background:none; border:none; color:#C9D4E2; font-weight:600; font-size:13.5px; padding:8px 12px; border-radius:7px; cursor:pointer;}
  .navlinks button:hover{color:#fff; background:rgba(255,255,255,.08);}
  .navlinks button.active{color:#fff; background:var(--bleu2);}
  .navlinks .cta{background:var(--terra); color:#fff;}
  .navlinks .cta:hover{background:var(--terra2);}
  .langsel{background:rgba(255,255,255,.1); color:#fff; border:1px solid rgba(255,255,255,.2); border-radius:7px; padding:7px 8px; font-size:13px; font-weight:600; cursor:pointer;}
  .langsel option{color:#1A1A1A;}

  /* HERO */
  .hero{background:linear-gradient(160deg, var(--bleu) 0%, var(--bleu2) 100%); color:#fff; padding:64px 0 72px; position:relative; overflow:hidden;}
  .hero::after{content:""; position:absolute; right:-80px; bottom:-80px; width:320px; height:320px; border-radius:50%; background:rgba(200,94,45,.18);}
  .hero .wrap{position:relative; z-index:2;}
  .hero h1{font-size:42px; line-height:1.1; font-weight:800; max-width:620px; margin-bottom:18px;}
  .hero h1 .acc{color:var(--terra2);}
  .hero p{font-size:18px; color:#D7E0EC; max-width:540px; margin-bottom:28px;}
  .hero .actions{display:flex; gap:12px; flex-wrap:wrap;}
  .heroband{display:flex; gap:30px; margin-top:42px; flex-wrap:wrap;}
  .heroband .it{display:flex; flex-direction:column;}
  .heroband .n{font-size:26px; font-weight:800; color:#fff;}
  .heroband .l{font-size:12px; color:#9FB3CC; letter-spacing:.5px;}

  /* BUTTONS */
  .btn{background:var(--terra); color:#fff; border:none; border-radius:9px; padding:13px 22px; font-weight:700; font-size:15px; cursor:pointer; transition:.15s;}
  .btn:hover{background:var(--terra2);}
  .btn.lg{padding:15px 28px; font-size:16px;}
  .btn.b{background:#fff; color:var(--bleu);}
  .btn.ghost{background:transparent; border:1.5px solid rgba(255,255,255,.4); color:#fff;}
  .btn.ghost:hover{background:rgba(255,255,255,.1);}
  .btn.sm{padding:8px 14px; font-size:13px;}
  .btn.full{width:100%;}
  .btn:disabled{opacity:.5; cursor:not-allowed;}
  .btn.outline{background:#fff; color:var(--terra); border:1.5px solid var(--terra);}

  /* SECTIONS */
  section{padding:54px 0;}
  .eyebrow{color:var(--terra); font-weight:700; font-size:12px; letter-spacing:2px; text-transform:uppercase; margin-bottom:8px;}
  h2.title{font-size:30px; color:var(--bleu); margin-bottom:8px; font-weight:800;}
  .lead{color:var(--gris); font-size:16px; max-width:560px; margin-bottom:32px;}

  /* CARDS / GRID */
  .grid{display:grid; gap:18px;}
  .g3{grid-template-columns:repeat(auto-fit, minmax(240px,1fr));}
  .g2{grid-template-columns:repeat(auto-fit, minmax(280px,1fr));}
  .g4{grid-template-columns:repeat(auto-fit, minmax(200px,1fr));}
  .card{background:#fff; border-radius:14px; padding:24px; box-shadow:var(--ombre);}
  .card .ico{width:46px; height:46px; border-radius:11px; background:var(--creme); display:flex; align-items:center; justify-content:center; font-size:22px; margin-bottom:14px;}
  .card h3{color:var(--bleu); font-size:18px; margin-bottom:6px;}
  .card p{color:var(--gris); font-size:14px;}

  /* CATALOG */
  .fam{background:#fff; border-radius:14px; padding:20px; box-shadow:var(--ombre);}
  .fam .top{display:flex; align-items:center; gap:12px; margin-bottom:14px;}
  .fam .emoji{font-size:30px;}
  .fam h3{color:var(--bleu); font-size:17px;}
  .fam .tag{font-size:11px; color:var(--gris);}
  .prod{display:flex; align-items:flex-start; gap:10px; padding:9px 0; border-top:1px solid #EFE9DC;}
  .prod .b{color:var(--terra); font-weight:800; flex-shrink:0;}
  .prod .nm{font-weight:600; color:var(--anthra); font-size:14px;}
  .prod .ds{font-size:12.5px; color:var(--gris);}

  /* CATALOGUE v2 */
  .cat-toolbar{margin-bottom:14px;}
  .cat-search{width:100%; max-width:440px; padding:13px 18px; border:1px solid #E2DDD0; border-radius:30px; font-size:15px; background:#fff; box-shadow:var(--ombre); outline:none;}
  .cat-search:focus{border-color:var(--terra);}
  .cat-filters{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:26px;}
  .cat-chip{padding:8px 16px; border-radius:30px; border:1px solid #E2DDD0; background:#fff; color:var(--anthra); font-size:13px; font-weight:600; cursor:pointer; transition:all .15s;}
  .cat-chip:hover{border-color:var(--terra);}
  .cat-chip.on{background:var(--bleu); color:#fff; border-color:var(--bleu);}
  .cat-group{margin-bottom:30px;}
  .cat-group-head{display:flex; align-items:center; gap:10px; margin-bottom:14px; padding-bottom:8px; border-bottom:2px solid var(--creme);}
  .cat-group-head h3{color:var(--bleu); font-size:19px; margin:0;}
  .cat-emoji{font-size:26px;}
  .cat-count{margin-left:auto; background:var(--creme); color:var(--gris); font-size:12px; font-weight:700; padding:3px 11px; border-radius:20px;}
  .cat-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:14px;}
  .prod-card{background:#fff; border-radius:14px; padding:14px; box-shadow:var(--ombre); display:flex; flex-direction:column; transition:transform .15s, box-shadow .15s; border:1px solid #F0EBDE;}
  .prod-card:hover{transform:translateY(-3px); box-shadow:0 8px 24px rgba(15,42,74,.14);}
  .prod-photo{position:relative; width:100%; aspect-ratio:1/1; border-radius:10px; overflow:hidden; background:var(--creme); display:flex; align-items:center; justify-content:center; margin-bottom:10px;}
  .prod-photo img{width:100%; height:100%; object-fit:cover;}
  .prod-photo-ph{font-size:46px; opacity:.5;}
  .prod-rupture{position:absolute; top:8px; left:8px; background:var(--rouge,#A33B3B); color:#fff; font-size:10px; font-weight:700; padding:3px 8px; border-radius:20px;}
  .prod-promo-badge{position:absolute; top:8px; right:8px; background:#2E6B3E; color:#fff; font-size:12px; font-weight:800; padding:4px 9px; border-radius:20px; box-shadow:0 2px 6px rgba(0,0,0,.2);}
  .prod-old{font-size:12px; font-weight:500; color:#999; text-decoration:line-through; margin-left:4px;}
  .prod-ic{width:48px; height:48px; border-radius:12px; background:var(--creme); display:flex; align-items:center; justify-content:center; font-size:24px; margin-bottom:12px;}
  .prod-nm{font-weight:700; color:var(--anthra); font-size:14px; margin-bottom:4px; line-height:1.3;}
  .prod-price{font-size:18px; font-weight:800; color:var(--terra); margin-bottom:10px;}
  .prod-unit{font-size:11px; font-weight:500; color:var(--gris);}
  .prod-ds{font-size:12.5px; color:var(--gris); flex:1; margin-bottom:14px; line-height:1.45;}
  .prod-add{background:var(--bleu); color:#fff; border:none; border-radius:9px; padding:9px; font-weight:700; font-size:13px; cursor:pointer; transition:background .15s; margin-top:auto;}
  .prod-add:hover{background:var(--terra);}

  /* SERVICES v2 */
  .svc-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:18px; margin-top:24px;}
  .svc-card{background:#fff; border-radius:16px; padding:26px; box-shadow:var(--ombre); border-top:4px solid var(--svc,var(--terra)); transition:transform .15s, box-shadow .15s;}
  .svc-card:hover{transform:translateY(-4px); box-shadow:0 10px 28px rgba(15,42,74,.15);}
  .svc-ic{width:56px; height:56px; border-radius:14px; background:var(--creme); display:flex; align-items:center; justify-content:center; font-size:28px; margin-bottom:16px;}
  .svc-card h3{color:var(--bleu); font-size:18px; margin-bottom:8px;}
  .svc-card p{color:var(--gris); font-size:14px; line-height:1.55;}

  /* FORMS */
  .panel{background:#fff; border-radius:14px; padding:26px; box-shadow:var(--ombre); max-width:520px; margin:0 auto;}
  .panel.wide{max-width:760px;}
  label{display:block; font-size:12px; font-weight:700; color:var(--bleu); margin:12px 0 4px; text-transform:uppercase; letter-spacing:.4px;}
  input,select,textarea{width:100%; padding:11px 12px; border:1.5px solid #D8D2C4; border-radius:9px; font-size:15px; font-family:inherit; background:#fff;}
  input:focus,select:focus,textarea:focus{outline:none; border-color:var(--terra);}
  textarea{min-height:90px; resize:vertical;}
  .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
  .grid2{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px;}
  .muted{color:var(--gris); font-size:13px;}
  .err{color:var(--rouge); font-size:13px; margin-top:8px;}
  .ok{color:var(--vert); font-size:13px; margin-top:8px;}

  /* TABS in account */
  .acctnav{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:22px; border-bottom:2px solid #E4DECF;}
  .acctnav button{background:none; border:none; padding:10px 16px; font-weight:600; font-size:14px; color:var(--gris); cursor:pointer; border-bottom:3px solid transparent; margin-bottom:-2px;}
  .acctnav button.active{color:var(--bleu); border-bottom-color:var(--terra);}

  /* TABLE */
  table{width:100%; border-collapse:collapse; font-size:14px;}
  th{background:var(--bleu); color:#fff; text-align:left; padding:10px; font-size:11px; letter-spacing:.5px; text-transform:uppercase;}
  td{padding:10px; border-bottom:1px solid #EDE7DA;}
  tr:nth-child(even) td{background:#FAF7F0;}
  .num{text-align:right;}
  .badge{display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; color:#fff;}
  .badge.new{background:var(--gris);} .badge.confirmed{background:var(--bleu);} .badge.delivered{background:var(--vert);}
  .badge.cancelled{background:var(--rouge);} .badge.pending{background:var(--terra);} .badge.resolved{background:var(--vert);}
  .tablewrap{overflow-x:auto; background:#fff; border-radius:14px; box-shadow:var(--ombre); padding:6px;}

  /* CART */
  .cartline{display:grid; grid-template-columns:1fr auto auto auto; gap:10px; align-items:center; padding:10px 0; border-bottom:1px solid #EFE9DC;}
  .qty{display:flex; align-items:center; gap:6px;}
  .qty button{width:30px; height:30px; border-radius:8px; border:1.5px solid #D8D2C4; background:#fff; font-size:17px; cursor:pointer; color:var(--bleu);}
  .total{font-size:20px; font-weight:800; color:var(--bleu); text-align:right; margin-top:12px;}
  .pill{display:inline-block; background:var(--creme); border-radius:20px; padding:5px 12px; font-size:13px; margin:3px; cursor:pointer; border:1.5px solid transparent;}
  .pill.on{border-color:var(--terra); background:#fff; font-weight:700; color:var(--terra);}

  /* FOOTER */
  footer{background:var(--bleu); color:#C9D4E2; padding:40px 0 24px; margin-top:40px;}
  footer .cols{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:24px;}
  footer h4{color:#fff; font-size:14px; margin-bottom:10px; letter-spacing:1px;}
  footer p,footer a{color:#9FB3CC; font-size:13.5px; display:block; margin-bottom:6px;}
  footer .copy{border-top:1px solid rgba(255,255,255,.12); margin-top:24px; padding-top:16px; font-size:12px; color:#7E91A8; text-align:center;}

  /* MODAL / TOAST */
  .modalbg{position:fixed; inset:0; background:rgba(15,42,74,.55); display:flex; align-items:center; justify-content:center; padding:14px; z-index:60;}
  .modal{background:#fff; border-radius:14px; padding:26px; width:100%; max-width:460px; max-height:92vh; overflow:auto; box-shadow:var(--ombre2);}
  .x{background:none; border:none; font-size:24px; color:var(--gris); cursor:pointer; float:right; line-height:1;}
  #toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--bleu); color:#fff; padding:13px 22px; border-radius:10px; font-weight:600; display:none; z-index:80; box-shadow:var(--ombre2);}
  .cfgbanner{background:#FCEFE7; border-bottom:1px solid var(--terra); color:#8a3f1b; font-size:13px; padding:8px 16px; text-align:center;}
  .hide{display:none !important;}
  @media(max-width:640px){ .hero h1{font-size:32px;} h2.title{font-size:24px;} section{padding:40px 0;} .topbar{padding:10px 14px;} }
</style>
</head>

<script>
/* ============================================================
   DISTRIVIA — Portail clients & fournisseurs
   Branché sur Firebase (même base que DISTRIVIA Gestion).
   Sans configuration, fonctionne en mode DÉMO (local).
   ============================================================ */

/* ---------- CONFIGURATION FIREBASE ----------
   MÊME bloc que dans DISTRIVIA Gestion (index.html).
   Les commandes des clients arriveront directement dans Gestion. */
const firebaseConfig = {
  apiKey: "AIzaSyCcl7rBRT1jiDwVR30_1dUND9HCKkq8sgg",
  authDomain: "distrivia-group.firebaseapp.com",
  projectId: "distrivia-group",
  storageBucket: "distrivia-group.firebasestorage.app",
  messagingSenderId: "379306867104",
  appId: "1:379306867104:web:08d849ee32095d67a88cc5"
};
/* -------------------------------------------------------------- */

const CONFIGURED = !!(firebaseConfig.apiKey && firebaseConfig.projectId);
let fdb = null;  // firestore
if(CONFIGURED){
  try{
    firebase.initializeApp(firebaseConfig);
    fdb = firebase.firestore();
    // Cache local Firestore : réponses instantanées au retour
    try{ fdb.enablePersistence({synchronizeTabs:true}).catch(()=>{}); }catch(e){}
    if(firebase.auth){
      // Persiste la session anonyme → fbReady() résout immédiatement aux visites suivantes
      try{ firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(()=>{}); }catch(e){}
      if(!firebase.auth().currentUser){
        firebase.auth().signInAnonymously().catch(e=>console.warn("Auth:",e&&e.code));
      }
    }
  }catch(e){ console.error("Firebase init:", e); }
}

/* ---------- Hash léger (offuscation mot de passe portail) ---------- */
async function sha256(str){
  if(window.crypto && window.crypto.subtle){
    const buf=await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
  }
  let h=5381; for(let i=0;i<str.length;i++) h=((h<<5)+h+str.charCodeAt(i))>>>0; return "h"+h.toString(16);
}

   DATA LAYER — Firestore (partagé avec Gestion) ou démo locale
   Collections : portal_clients, portal_suppliers, portal_orders,
   portal_appointments, portal_claims, portal_quotes, distrivia/etat (catalogue)
   ============================================================ */
async function fbReady(){
  if(!CONFIGURED || !firebase.auth) return;
  if(firebase.auth().currentUser) return;
  await new Promise(res=>{ const to=setTimeout(res,2500);
    const u=firebase.auth().onAuthStateChanged(x=>{ if(x){ clearTimeout(to); u(); res(); } }); });
}
async function dbSignUp(kind, payload){
  const table = kind==="client" ? "portal_clients" : "portal_suppliers";
  const hash = await sha256(payload.email.toLowerCase()+"|"+payload.password);
  if(CONFIGURED){
    await fbReady();
    const snap = await fdb.collection(table).where("email","==",payload.email.toLowerCase()).limit(1).get();
    if(!snap.empty) throw new Error("Un compte existe déjà avec cet email.");
    const ref = await fdb.collection(table).add({
      name:payload.name, email:payload.email.toLowerCase(), phone:payload.phone||"",
      hash, details:payload, kind, created:nowISO()
    });
    return { id:ref.id, name:payload.name, email:payload.email.toLowerCase(), kind };
  }
  const d=demoDB();
  if(d.accounts.some(a=>a.email===payload.email.toLowerCase())) throw new Error("Un compte existe déjà avec cet email.");
  const acc={ id:uid(), kind, name:payload.name, email:payload.email.toLowerCase(), hash,
    phone:payload.phone||"", details:payload, created:nowISO() };
  d.accounts.push(acc); demoSave(d);
  return acc;
}
async function dbSignIn(kind, email, password){
  const table = kind==="client" ? "portal_clients" : "portal_suppliers";
  const hash = await sha256(email.toLowerCase()+"|"+password);
  if(CONFIGURED){
    await fbReady();
    const snap = await fdb.collection(table).where("email","==",email.toLowerCase()).limit(1).get();
    if(snap.empty) throw new Error("Aucun compte "+(kind==="client"?"client":"fournisseur")+" avec cet email.");
    const doc = snap.docs[0]; const data = doc.data();
    if(data.hash !== hash) throw new Error("Mot de passe incorrect.");
    return { id:doc.id, name:data.name, email:data.email, kind };
  }
  const d=demoDB();
  const acc=d.accounts.find(a=>a.email===email.toLowerCase() && a.hash===hash && a.kind===kind);
  if(!acc) throw new Error("Email ou mot de passe incorrect.");
  return acc;
}
async function dbInsert(table, row){
  if(CONFIGURED){ await fbReady(); await fdb.collection(table).doc(row.id).set(row); return; }
  const d=demoDB(); const key={ portal_orders:"orders", portal_appointments:"appointments", portal_claims:"claims", portal_quotes:"quotes" }[table];
  d[key].push(row); demoSave(d);
}
async function dbList(table, ownerField, ownerId){
  if(CONFIGURED){
    await fbReady();
    const snap = await fdb.collection(table).where(ownerField,"==",ownerId).get();
    const rows = snap.docs.map(d=>d.data());
    return rows.sort((a,b)=>(a.created<b.created?1:-1));
  }
  const d=demoDB(); const key={ portal_orders:"orders", portal_appointments:"appointments", portal_claims:"claims", portal_quotes:"quotes" }[table];
  return (d[key]||[]).filter(r=>r[ownerField]===ownerId).sort((a,b)=>(a.created<b.created?1:-1));
}
let catalogLoaded = false;
async function loadCatalog(force){
  if(!CONFIGURED) return;
  if(catalogLoaded && !force) return;        // déjà chargé : on ne refait rien
  // 1) Affichage instantané depuis le cache local (si dispo)
  try{
    const cached = localStorage.getItem("distrivia-portail-catalog");
    if(cached && !catalogProducts.length){ catalogProducts = JSON.parse(cached); }
  }catch(e){}
  // 2) Rafraîchissement depuis Firebase en arrière-plan
  try{
    await fbReady();
    const snap = await fdb.collection("distrivia").doc("etat").get();
    if(snap.exists){
      const blob = snap.data().blob;
      if(blob){ const S = JSON.parse(blob);
        if(S.products && S.products.length){
          const promos = (S.promos||[]).filter(pr=>pr.active!==false && (!pr.expire || pr.expire>=new Date().toISOString().slice(0,10)));
          catalogProducts = S.products.map(p=>{
            // trouver la meilleure promo applicable
            let bestPct=0;
            promos.forEach(pr=>{
              const ok = pr.target==="all" || (pr.target.startsWith("fam:")&&pr.target.slice(4)===p.family) || (pr.target.startsWith("prod:")&&+pr.target.slice(5)===p.id);
              if(ok && pr.pct>bestPct) bestPct=pr.pct;
            });
            const promoPrice = bestPct? Math.round(p.price*(1-bestPct/100)) : null;
            return { name:p.name, family:p.family, price:p.price, img:p.img||null, stock:p.stock, promoPct:bestPct||null, promoPrice };
          });
          try{ localStorage.setItem("distrivia-portail-catalog", JSON.stringify(catalogProducts)); }catch(e){}
        }
      }
    }
    catalogLoaded = true;
  }catch(e){ console.warn("Catalogue:", e); }
}
async function loadAnnouncements(){
  // cache instantané
  try{ const c=localStorage.getItem("distrivia-portail-anns"); if(c && !announcements.length) announcements=JSON.parse(c); }catch(e){}
  if(!CONFIGURED) return;
  try{
    await fbReady();
    const snap = await fdb.collection("portal_announcements").get();
    const today = new Date().toISOString().slice(0,10);
    announcements = snap.docs.map(d=>d.data())
      .filter(a=>a.active!==false && (!a.expire || a.expire>=today))
      .sort((a,b)=>(a.created<b.created?1:-1));
    try{ localStorage.setItem("distrivia-portail-anns", JSON.stringify(announcements)); }catch(e){}
    // rafraîchir l'accueil si affiché
    if(view==="home"){ const box=el("ann-box"); if(box) box.innerHTML=announcementsHTML(); }
  }catch(e){ console.warn("Annonces:", e); }
}

async function loadTrackOrder(num){
  trackLoading = true;
  try{
    await fbReady();
    const snap = await fdb.collection("distrivia").doc("etat").get();
    if(snap.exists){
      const blob = snap.data().blob;
      if(blob){ const St = JSON.parse(blob);

        if(o){
          const cli = (St.clients||[]).find(c=>c.id===o.clientId)||{};

let catFilter = "__all__";
let catSearch = "";
function vCatalog(){
  // Produits live de Gestion regroupés par famille (sinon fallback FAMILIES)
  const live = catalogProducts.length>0;
  const famNames = FAMILIES.map(f=>f.name);
  const emojiOf = n=>{ const f=FAMILIES.find(f=>f.name===n); return f?f.emoji:"📦"; };
  let groups = {};
  if(live){
    catalogProducts.forEach(p=>{ const fam=p.family||"Autres"; (groups[fam]=groups[fam]||[]).push(p); });
  } else {
    FAMILIES.forEach(f=>{ groups[f.name]=f.items.map(([n,d])=>({name:n,desc:d,family:f.name})); });
  }
  const allFams = Object.keys(groups);
  const filters = ["__all__", ...allFams];
  const q = catSearch.trim().toLowerCase();
  // applique filtre + recherche
  const visibleFams = allFams.filter(f=> catFilter==="Tous" || catFilter==="__all__" || f===catFilter);
  let cards = "";
  visibleFams.forEach(fam=>{
    const items = groups[fam].filter(p=> !q || (p.name||"").toLowerCase().includes(q) || (p.desc||"").toLowerCase().includes(q));
    if(!items.length) return;
    cards += `<div class="cat-group">
      <div class="cat-group-head"><span class="cat-emoji">${emojiOf(fam)}</span><h3>${esc(fam)}</h3><span class="cat-count">${items.length}</span></div>
      <div class="cat-grid">
        ${items.map(p=>{
          const prix = p.price ? money(p.price) : "";
          const promo = p.promoPrice ? money(p.promoPrice) : "";
          const rupture = (p.stock!==undefined && p.stock<=0);
          return `<div class="prod-card">
          <div class="prod-photo">${p.img?`<img src="${p.img}" alt="${esc(p.name)}">`:`<span class="prod-photo-ph">${emojiOf(fam)}</span>`}${p.promoPct?`<span class="prod-promo-badge">−${p.promoPct}%</span>`:""}${rupture?`<span class="prod-rupture">${t("cat_rupture")}</span>`:''}</div>
          <div class="prod-nm">${esc(p.name)}</div>
          ${prix?(p.promoPrice
              ? `<div class="prod-price">${promo}<span class="prod-old"> ${prix}</span><span class="prod-unit">${t("cat_per_carton")}</span></div>`
              : `<div class="prod-price">${prix}<span class="prod-unit">${t("cat_per_carton")}</span></div>`)
            :`<div class="prod-ds">${t("cat_price_demand")}</div>`}
          <button class="prod-add" ${rupture?'disabled style="opacity:.5;cursor:not-allowed"':''} onclick="quickOrder('${esc((p.name||'').replace(/'/g,"\\'"))}')">${rupture?t("cat_unavailable"):t("cat_order_btn")}</button>
        </div>`;}).join("")}
      </div></div>`;
  });
  if(!cards) cards = `<div class="card" style="text-align:center;padding:40px"><p class="muted">${t("cat_no_match")} « ${esc(catSearch)} ».</p></div>`;
  return `<section><div class="wrap">
    <div class="eyebrow">${t("cat_eyebrow")}</div>
    <h2 class="title">${t("cat_title")}</h2>
    <p class="lead">${live?t("cat_lead_live"):t("cat_lead_static")} ${t("cat_lead2")}</p>
    <div class="cat-toolbar">
      <input id="cat-search" class="cat-search" placeholder="${t("cat_search")}" value="${esc(catSearch)}">
    </div>
    <div class="cat-filters">
      ${filters.map(f=>`<button class="cat-chip ${(catFilter===f||(catFilter==='Tous'&&f==='__all__'))?'on':''}" data-catf="${esc(f)}">${f==="__all__"?t("cat_all"):emojiOf(f)+" "+esc(f)}</button>`).join("")}
    </div>
    ${cards}
    <div style="text-align:center; margin-top:30px">
      <button class="btn lg" onclick="go('client-auth')">${t("cat_create_account")}</button>
    </div>
  </div></section>`;
}
function bindCatalog(){
  const s=el("cat-search");
  if(s){ s.oninput=()=>{ catSearch=s.value; const pos=s.selectionStart; rerenderCatalog(); const ns=el("cat-search"); if(ns){ ns.focus(); try{ns.setSelectionRange(pos,pos);}catch(e){} } }; }

}

async function doReset(kind){
  const email=el("a-email").value.trim().toLowerCase(), phone=el("a-phone").value.trim(), np=el("a-newpass").value;
  if(!email||!phone||!np){ el("a-fb").innerHTML=`<div class="err">Tous les champs sont requis.</div>`; return; }
  if(np.length<6){ el("a-fb").innerHTML=`<div class="err">Le mot de passe doit faire au moins 6 caractères.</div>`; return; }
  el("a-fb").innerHTML=`<p class="muted" style="margin-top:8px">Vérification…</p>`;
  const table = kind==="client" ? "portal_clients" : "portal_suppliers";
  const onlyDigits = s=>(s||"").replace(/[^\d]/g,"");
  try{
    if(!CONFIGURED){ el("a-fb").innerHTML=`<div class="err">Service hors-ligne. Contactez DISTRIVIA.</div>`; return; }
    await fbReady();
    const snap = await fdb.collection(table).where("email","==",email).limit(1).get();
    if(snap.empty){ el("a-fb").innerHTML=`<div class="err">Aucun compte avec cet email.</div>`; return; }
    const doc=snap.docs[0], data=doc.data();
    // vérifie le téléphone (comparaison sur les chiffres uniquement)
    const savedPhone = onlyDigits(data.phone);
    if(!savedPhone || onlyDigits(phone)!==savedPhone){ el("a-fb").innerHTML=`<div class="err">Le téléphone ne correspond pas à ce compte. Contactez DISTRIVIA si besoin.</div>`; return; }
    const newHash = await sha256(email+"|"+np);
    await fdb.collection(table).doc(doc.id).update({ hash:newHash });
    el("a-fb").innerHTML=`<div class="ok">Mot de passe réinitialisé ✓ Vous pouvez vous connecter.</div>`;
    setTimeout(()=>switchAuth("login"), 1500);
  }catch(e){ el("a-fb").innerHTML=`<div class="err">${esc(e.message||"Erreur")}</div>`; }
}

let _invoiceCache = {};
let _invoiceCompany = {};
async function clientInvoicesHTML(){
  if(!CONFIGURED) return `<div class="card"><p class="muted">${t("inv_none2")}</p></div>`;
  let orders=[]; _invoiceCache={};
  try{
    await fbReady();
    const snap=await fdb.collection("distrivia").doc("etat").get();
    if(snap.exists){ const St=JSON.parse(snap.data().blob||"{}");
      _invoiceCompany = { ninea:(St.settings&&St.settings.ninea)||"", rccm:(St.settings&&St.settings.rccm)||"", tvaEnabled:(St.settings&&St.settings.tvaEnabled), tvaRate:(St.settings&&St.settings.tvaRate)||0 };
      const myName=(session.name||"").toLowerCase(), myEmail=(session.email||"").toLowerCase();
      const cli=(St.clients||[]).find(c=> (c.email&&c.email.toLowerCase()===myEmail) || (c.name&&c.name.toLowerCase()===myName));
      if(cli){
        const prodName=id=>{ const p=(St.products||[]).find(p=>p.id===id); return p?p.name:""; };
        orders=(St.orders||[]).filter(o=>o.clientId===cli.id && o.invoiceNum && o.status!=="cancelled").map(o=>{
          const ttc=o.lines.reduce((a,l)=>a+l.qty*l.price,0);
          const paid=(o.payments||[]).reduce((a,p)=>a+p.amount,0);
          const due=Math.max(0,ttc-paid);
          const obj={ num:o.invoiceNum, ref:o.num, date:o.date, ttc, paid, due, st: due<=0?"paid":(paid>0?"partial":"unpaid"),
            client:{name:cli.name, matricule:cli.matricule, type:cli.type, phone:cli.phone, zone:cli.zone},
            lines:o.lines.map(l=>({name:l.name||prodName(l.productId), qty:l.qty, price:l.price})),
            payMode:o.payMode, dueDate:o.dueDate };
          _invoiceCache[obj.num]=obj;
          return obj;
        }).sort((a,b)=>(a.num<b.num?1:-1));
      }
    }
  }catch(e){ console.warn("factures:",e); }

    <div id="chat-scroll" style="background:var(--creme);padding:14px 16px;height:46vh;min-height:280px;overflow-y:auto">${bubbles}</div>
    <div style="display:flex;gap:8px;padding:12px;border-top:1px solid #eee;background:#fff">
      <textarea id="chat-input" rows="1" placeholder="${t('chat_input_ph')}" style="flex:1;resize:none;border:1px solid #ddd;border-radius:20px;padding:10px 16px;font-family:inherit;font-size:14px"></textarea>
      <button class="btn" id="chat-send" style="border-radius:20px;padding:10px 20px">${t("send")}</button>
    </div>
  </div>`;
}
function fmtTime(iso){ if(!iso) return ""; const d=new Date(iso); if(isNaN(d)) return (iso||"").slice(0,16).replace("T"," ");
  const today=new Date(); const sameDay=d.toDateString()===today.toDateString();
  const hh=String(d.getHours()).padStart(2,"0"), mm=String(d.getMinutes()).padStart(2,"0");
  return sameDay ? `${hh}:${mm}` : `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")} ${hh}:${mm}`; }
function bindClaim(){
  const scroll=el("chat-scroll"); if(scroll) scroll.scrollTop=scroll.scrollHeight;
  const send=el("chat-send"), input=el("chat-input");
  if(send) send.onclick = sendChat;
  if(input){ input.onkeydown = e=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); sendChat(); } }; }
  // écoute temps réel des réponses DISTRIVIA
  if(CONFIGURED && !_convoUnsub){
    try{ _convoUnsub = fdb.collection("portal_threads").doc(convoId()).onSnapshot(snap=>{
      if(snap.exists){ const data=snap.data();
        const old=(_convo&&_convo.messages||[]).length; _convo=data;
        if((data.messages||[]).length!==old && (view==="client"||view==="supplier") && acctTab==="claims"){
          const sc=el("chat-scroll"); if(sc){ sc.innerHTML=chatBubbles(); sc.scrollTop=sc.scrollHeight; }
        }
      }
    }); }catch(e){}
  }
}
function chatBubbles(){
  const msgs=(_convo&&_convo.messages)||[];
  if(!msgs.length) return `<div style="text-align:center;color:#888;padding:30px 10px;font-size:14px">${t("chat_start")}</div>`;
  return msgs.map(m=>{ const mine=m.from!=="DISTRIVIA";
    return `<div style="display:flex;${mine?"justify-content:flex-end":"justify-content:flex-start"};margin:6px 0">
      <div style="max-width:75%;background:${mine?"var(--bleu)":"#fff"};color:${mine?"#fff":"#1A1A1A"};padding:9px 13px;border-radius:14px;${mine?"border-bottom-right-radius:4px":"border-bottom-left-radius:4px"};box-shadow:0 1px 3px rgba(15,42,74,.12)">
        <div style="font-size:14px;line-height:1.45;white-space:pre-wrap">${esc(m.text)}</div>
        <div style="font-size:10px;opacity:.65;text-align:right;margin-top:3px">${fmtTime(m.date)}</div></div></div>`; }).join("");
}
async function sendChat(){
  const input=el("chat-input"); const t=(input.value||"").trim(); if(!t) return;
  input.value="";
  const msg={ from:session.kind==="client"?"client":"supplier", text:t, date:nowISO() };
  // construit/complète la conversation
  if(!_convo){ _convo = { id:convoId(), kind:session.kind, party_id:session.id, party_name:session.name,
    party_email:session.email||"", messages:[], status:"open", created:nowISO() }; }
  _convo.messages = [...(_convo.messages||[]), msg];
  _convo.lastFrom = msg.from; _convo.lastText = t; _convo.updated = nowISO(); _convo.status="open";
  _convo.unreadForAdmin = true;
  // affichage immédiat (optimiste)
  const sc=el("chat-scroll"); if(sc){ sc.innerHTML=chatBubbles(); sc.scrollTop=sc.scrollHeight; }
  try{
    if(CONFIGURED){ await fbReady(); await fdb.collection("portal_threads").doc(convoId()).set(_convo); }
    else saveDemoConvo(_convo);
  }catch(e){ toast("Erreur d'envoi — réessayez"); }
}
window.sendChat=sendChat;

/* ----- Supplier: quotes ----- */

}
function supplierNewQuoteHTML(){
  return `<div class="panel wide" style="margin:0">
    <h3 style="color:var(--bleu); margin-bottom:10px">Proposer une cotation</h3>
    <p class="muted" style="margin-bottom:8px">Soumettez votre offre pour un produit. Notre équipe achats l'étudie et vous répond.</p>

      <div><label>Produit / référence</label><input id="q-product" placeholder="Ex. Boîte kraft 1000 ml"></div>

    </div>
    <label>Conditions (paiement, certificats, échantillons…)</label><textarea id="q-terms" placeholder="30 % acompte, solde contre documents ; certificat alimentarité disponible…"></textarea>
    <button class="btn full" style="margin-top:14px" onclick="submitQuote()">Envoyer la cotation</button>
    <div id="q-fb"></div>
  </div>`;
}
function bindQuote(){}
async function submitQuote(){
  const product=el("q-product").value.trim(), price=el("q-price").value.trim();
  if(!product||!price){ el("q-fb").innerHTML=`<div class="err">Produit et prix sont requis.</div>`; return; }
  const ref="COT-"+new Date().getFullYear()+"-"+uid().slice(0,5).toUpperCase();
  const row={ id:uid(), ref, supplier_id:session.id, supplier_name:session.name, product, moq:el("q-moq").value.trim(),
    price, delay:el("q-delay").value.trim(), terms:el("q-terms").value.trim(), status:"pending", created:nowISO() };
  try{ await dbInsert("portal_quotes", row); acctTab="quotes"; render(); toast("Cotation "+ref+" envoyée ✓"); }
  catch(e){ el("q-fb").innerHTML=`<div class="err">${esc(e.message)}</div>`; }
}

/* ---------- Modal / nav helpers ---------- */
function openModal(html){ el("modal").innerHTML=`<div class="modalbg" id="mbg"><div class="modal">${html}</div></div>`; el("mbg").onclick=e=>{ if(e.target.id==="mbg") closeModal(); }; }
function closeModal(){ el("modal").innerHTML=""; }
function go(v){ view=v; if(v==="client-auth"||v==="supplier-auth") authMode="login"; render(); if(v==="client-auth"||v==="supplier-auth") renderAuthBody(); if(v==="client"||v==="supplier") renderAcctBody(); }
function bind(){ if(view==="client-auth"||view==="supplier-auth") renderAuthBody(); if(view==="client"||view==="supplier") renderAcctBody(); if(view==="catalog") bindCatalog(); }
function saveSession(){ try{ localStorage.setItem("distrivia-portail-session", JSON.stringify(session)); }catch(e){} }
function logout(){ if(CONFIGURED&&firebase.auth){ try{ /* on garde la session anonyme Firebase */ }catch(e){} } session=null; try{ localStorage.removeItem("distrivia-portail-session"); }catch(e){} cart=[]; go("home"); toast("Vous êtes déconnecté."); }

/* expose */
window.go=go; window.setTab=setTab; window.switchAuth=switchAuth; window.doLogin=doLogin; window.doSignup=doSignup;
window.submitOrder=submitOrder; window.cartQty=cartQty; window.cartRemove=cartRemove; window.showOrder=showOrder;
window.submitAppt=submitAppt; window.submitQuote=submitQuote; window.sendContact=sendContact;
window.openModal=openModal; window.closeModal=closeModal; window.logout=logout;

/* ---------- Boot ---------- */
(async function boot(){
  try{ const s=localStorage.getItem("distrivia-portail-session"); if(s){ session=JSON.parse(s); } }catch(e){}
  // Catalogue depuis le cache : disponible instantanément, avant même Firebase
  try{ const c=localStorage.getItem("distrivia-portail-catalog"); if(c) catalogProducts=JSON.parse(c); }catch(e){}
  try{ const a=localStorage.getItem("distrivia-portail-anns"); if(a) announcements=JSON.parse(a); }catch(e){}
  // QR code commande : ?cmd=CMD-XXXX → page de suivi
  let cmdParam = null;
  try{ cmdParam = new URLSearchParams(location.search).get("cmd"); }catch(e){}
  if(cmdParam){ view="track"; }
  else if(session){ view=session.kind; acctTab = session.kind==="client"?"orders":"quotes"; }
  render();
  if(CONFIGURED){
    try{
      if(cmdParam){ loadTrackOrder(cmdParam); }
      await loadCatalog(); loadAnnouncements();
      if(view==="client"&&acctTab==="new") renderAcctBody();
    }catch(e){ console.warn("Firebase init:",e); }
  }
})();
</script>
